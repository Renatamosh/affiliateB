  # ── LEARN BRIDGE SUB-PAGES (folder collection) ───────────────────────────
  - name: "learn-bridge"
    label: "🎓 Learn Bridge — Articles"
    label_singular: "Learn Bridge Article"
    description: "All 10 articles in the /learn-bridge/ cluster."
    folder: "content/learn-bridge"
    create: true
    format: "json"
    extension: "json"
    identifier_field: "heading"
    slug: "{{slug}}"
    filter: { field: "heading", value: "Learn Bridge", pattern: "^(?!Learn Bridge$).*" }
    preview_path: "/learn-bridge/{{slug}}/"
    fields:
      - label: "SEO Title (50–60 chars)"
        name: seoTitle
        widget: string
        hint: "Include primary keyword near the start. Target 50–60 characters."
      - label: "Meta Description (150–160 chars)"
        name: metaDescription
        widget: text
        hint: "Include primary keyword. Write it as a compelling summary. Target 150–160 chars."
      - label: "Eyebrow Label"
        name: eyebrow
        widget: string
        hint: "Small label above the H1. E.g. 'Beginner Guide · Start Here'"
      - label: "H1 Page Heading"
        name: heading
        widget: string
        hint: "The main H1 for this page. Include the primary keyword."
      - label: "Hero Subtitle"
        name: subtitle
        widget: text
        hint: "1-2 sentences below the H1. Sets context and search intent."
      - label: "FAQ Section Title"
        name: faqTitle
        widget: string
        default: "Frequently Asked Questions"
      - label: "FAQ 1 — Question"
        name: faq1q
        widget: string
      - label: "FAQ 1 — Answer"
        name: faq1a
        widget: text
        hint: "Write the answer as it would appear in a Google featured snippet."
      - label: "FAQ 2 — Question"
        name: faq2q
        widget: string
      - label: "FAQ 2 — Answer"
        name: faq2a
        widget: text
      - label: "FAQ 3 — Question"
        name: faq3q
        widget: string
      - label: "FAQ 3 — Answer"
        name: faq3a
        widget: text
      - label: "FAQ 4 — Question"
        name: faq4q
        widget: string
      - label: "FAQ 4 — Answer"
        name: faq4a
        widget: text
      - label: "FAQ 5 — Question"
        name: faq5q
        widget: string
      - label: "FAQ 5 — Answer"
        name: faq5a
        widget: text
