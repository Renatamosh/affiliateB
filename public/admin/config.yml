    folder: "content/categories"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string", required: true }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL path, e.g. 'reviews' for /reviews/" }
      - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string", required: false, hint: "One-line display tagline shown under the category title" }
      - { label: "Intro Body", name: "body", widget: "markdown", required: false, hint: "2–3 paragraph intro for the category landing page (250–400 words). Target the category keyword." }
      - { label: "Featured Image", name: "featured_image", widget: "image", required: false }
      - { label: "Featured Image Alt", name: "featured_image_alt", widget: "string", required: false }
      - label: "FAQ"
        name: "faq"
        widget: "list"
        required: false
        hint: "Minimum 4 questions for AEO/AI snippet targeting. Write questions as real Google searches."
        summary: "{{fields.question}}"
        fields:
          - { label: "Question", name: "question", widget: "string", required: true }
          - { label: "Answer", name: "answer", widget: "text", required: true }
      - label: "Internal Links"
        name: "internal_links"
        widget: "list"
        required: false
        hint: "Link to the 3–5 most important pages in this category"
        summary: "{{fields.label}}"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }
      - { label: "SEO Title", name: "meta_title", widget: "string", required: false, hint: "50–60 characters with target keyword" }
      - { label: "SEO Description", name: "meta_description", widget: "text", required: false, hint: "150–160 characters with a call to action" }
      - { label: "OG Title", name: "og_title", widget: "string", required: false }
      - { label: "OG Description", name: "og_description", widget: "text", required: false }
      - { label: "OG Image", name: "og_image", widget: "image", required: false }
      - { label: "Canonical URL", name: "canonical", widget: "string", required: false, hint: "Full URL, e.g. https://bridgeplaybook.com/reviews/" }
      - label: "Schema Type"
        name: "schema_type"
        widget: "select"
        required: false
        options: ["CollectionPage", "ItemList"]
        default: "CollectionPage"

  # ─────────────────────────────────────────────
  # 📄 PAGES
  # ─────────────────────────────────────────────
  - name: "pages"
    label: "📄 Pages"
    files:
      - label: "Homepage"
        name: "home"
        file: "content/home.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Hero Heading", name: "hero_heading", widget: "string" }
          - { label: "Hero Subheading", name: "hero_subheading", widget: "text" }
          - { label: "Meta Title", name: "meta_title", widget: "string", required: true }
          - { label: "Meta Description", name: "meta_description", widget: "text", required: true }
          - { label: "OG Image", name: "og_image", widget: "image", required: false }
      - label: "About"
        name: "about"
        file: "content/about.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
          - { label: "Meta Title", name: "meta_title", widget: "string" }
          - { label: "Meta Description", name: "meta_description", widget: "text" }
      - label: "Glossary"
        name: "glossary"
        file: "content/pages/glossary.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Hero Heading", name: "hero_heading", widget: "string", required: false }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string", required: false }
          - { label: "Intro Body", name: "body", widget: "markdown", required: false }
