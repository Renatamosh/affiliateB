backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

collections:
  # ─────────────────────────────────────────────
  # ⭐ REVIEW PAGES — Edit BBO, Funbridge & RealBridge reviews here.
  # Changes go live after Netlify rebuilds (~60 seconds after saving).
  # ─────────────────────────────────────────────
  - name: "reviews"
    label: "⭐ Platform Reviews"
    files:
      - label: "Bridge Base Online (BBO)"
        name: "bbo"
        file: "content/platforms/bbo.json"
        format: json
        fields:
          - { label: "Platform Name", name: "name", widget: "string", hint: "Shown in the page heading" }
          - { label: "Badge Text", name: "badge", widget: "string", hint: "Shown next to the title, e.g. Free · BBO+ $5.99/mo" }
          - { label: "Featured Image", name: "featured_image", widget: "image", required: false, hint: "Banner shown at top of the review page" }
          - { label: "Featured Image Alt Text", name: "featured_image_alt", widget: "string", required: false }
          - { label: "Tagline", name: "tagline", widget: "string", hint: "Bold italic quote shown at top of the review body, e.g. The world's largest online bridge platform..." }
          - { label: "Overview Paragraph", name: "overview", widget: "text", hint: "2–3 sentence intro paragraph shown below the tagline" }
          - label: "Content Sections"
            name: "sections"
            widget: "list"
            summary: "{{fields.title}}"
            hint: "The main body sections of the review, in the order they appear on the page"
            fields:
              - { label: "Section Heading", name: "title", widget: "string" }
              - { label: "Section Body", name: "body", widget: "markdown" }
          - label: "Pros"
            name: "pros"
            widget: "list"
            field: { label: "Pro", name: "pro", widget: "string" }
            hint: "Shown in the green Pros box"
          - label: "Cons"
            name: "cons"
            widget: "list"
            field: { label: "Con", name: "con", widget: "string" }
            hint: "Shown in the red Cons box"
          - { label: "Verdict", name: "verdict", widget: "text", hint: "The 'Our Verdict' block shown at the bottom of the main column" }
          - label: "Star Ratings (Sidebar)"
            name: "scores"
            widget: "list"
            summary: "{{fields.label}}"
            hint: "Each rating appears as a labelled star bar in the sidebar"
            fields:
              - { label: "Category Label", name: "label", widget: "string", hint: "e.g. Ease of Use, Game Variety" }
              - { label: "Stars (1–5)", name: "n", widget: "number", value_type: "int", min: 1, max: 5 }
          - { label: "Overall Rating", name: "rating", widget: "number", value_type: "float", min: 1, max: 5, step: 0.1, hint: "Used for the Overall row and schema markup, e.g. 4.6" }
          - { label: "Price (Quick Facts)", name: "price", widget: "string", hint: "e.g. Free / BBO+ $5.99/mo" }
          - { label: "Best For (Quick Facts)", name: "bestFor", widget: "string", hint: "e.g. Live human play, ACBL masterpoints" }
          - { label: "Last Verified (Quick Facts)", name: "lastVerified", widget: "string", hint: "e.g. May 2026" }
          - { label: "Visit Button URL", name: "visitUrl", widget: "string", hint: "The URL for the 'Visit BBO' button" }
          - label: "FAQ"
            name: "faq"
            widget: "list"
            summary: "{{fields.q}}"
            hint: "Minimum 4 questions. Write as real Google searches, e.g. 'Is BBO completely free?'"
            fields:
              - { label: "Question", name: "q", widget: "string" }
              - { label: "Answer", name: "a", widget: "text" }
          - { label: "SEO Section Title", name: "seo_section_title", widget: "string", default: "Full Review", required: false }
          - { label: "SEO Body", name: "seo_body", widget: "markdown", required: false }
          - { label: "Meta Title", name: "meta_title", widget: "string", hint: "Max 60 characters. Include main keyword." }
          - { label: "Meta Description", name: "meta_description", widget: "text", hint: "Max 160 characters. Include a call to action." }
          - { label: "OG Title", name: "og_title", widget: "string", required: false, hint: "Leave blank to use Meta Title" }
          - { label: "OG Description", name: "og_description", widget: "text", required: false, hint: "Leave blank to use Meta Description" }
          - { label: "OG Image", name: "og_image", widget: "image", required: false }
          - { label: "Canonical URL", name: "canonical", widget: "string", required: false, hint: "Full URL including trailing slash, e.g. https://bridgeplaybook.com/reviews/bridge-base-online-bbo-review/" }
          - label: "Entity Tags (Semantic SEO)"
            name: "entity_tags"
            widget: "list"
            field: { label: "Entity", name: "entity", widget: "string" }
            required: false

