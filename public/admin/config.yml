          - { label: "Overall Rating", name: "rating", widget: "number", value_type: "float", min: 1, max: 5, step: 0.1 }
          - { label: "Price (Quick Facts)", name: "price", widget: "string" }
          - { label: "Best For (Quick Facts)", name: "bestFor", widget: "string" }
          - { label: "Last Verified (Quick Facts)", name: "lastVerified", widget: "string" }
