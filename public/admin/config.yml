  # ─────────────────────────────────────────────
  # 📘 GUIDES  →  bridgeplaybook.com/guides/slug
  # ─────────────────────────────────────────────
  - name: "guides"
    label: "📘 Guides"
    folder: "content/guides"
    create: true
    slug: "{{slug}}"
    preview_path: "guides/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", required: true }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL-friendly version of the title, e.g. how-to-bid-in-bridge" }
      - { label: "Publish Date", name: "date", widget: "datetime", required: true }
      - label: "Status"
        name: "status"
        widget: "select"
        options: ["draft", "published", "archived"]
        default: "draft"
      - label: "Tags"
        name: "tags"
        widget: "list"
        field: { label: "Tag", name: "tag", widget: "string" }
      - { label: "Featured Image", name: "featured_image", widget: "image", required: false }
      - { label: "Featured Image Alt Text", name: "featured_image_alt", widget: "string", required: false }
      - { label: "Excerpt / Summary", name: "excerpt", widget: "text", hint: "Used in article cards and as meta description fallback" }
      - { label: "Body", name: "body", widget: "markdown" }
      - label: "Key Takeaways"
        name: "key_takeaways"
        widget: "list"
        field: { label: "Takeaway", name: "takeaway", widget: "string" }
      - label: "FAQ"
        name: "faq"
        widget: "list"
        summary: "{{fields.question}}"
        fields:
          - { label: "Question", name: "question", widget: "string", required: true }
          - { label: "Answer", name: "answer", widget: "text", required: true }
      - label: "Affiliate Links"
        name: "affiliate_links"
        widget: "list"
        summary: "{{fields.label}}"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }
          - { label: "Nofollow", name: "nofollow", widget: "boolean", default: true }
      - label: "Internal Links / Related Articles"
        name: "internal_links"
        widget: "list"
        summary: "{{fields.label}}"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }
      - { label: "Meta Title", name: "meta_title", widget: "string", required: true, hint: "Max 60 characters" }
      - { label: "Meta Description", name: "meta_description", widget: "text", required: true, hint: "Max 160 characters" }
      - { label: "OG Title", name: "og_title", widget: "string", required: false }
      - { label: "OG Description", name: "og_description", widget: "text", required: false }
      - { label: "OG Image", name: "og_image", widget: "image", required: false }
      - { label: "Canonical URL", name: "canonical", widget: "string", required: false }
      - { label: "SEO Section Title (h2)", name: "seo_section_title", widget: "string", default: "Full Guide", required: false, hint: "The h2 heading shown above the SEO section — set it per article, e.g. 'The Complete Mac Bridge Guide'" }
      - { label: "SEO Body (Full Guide section)", name: "seo_body", widget: "markdown", required: false, hint: "One rich-text block. Use ## for subheadings, **bold** for emphasis. Type card suits directly: ♥ ♦ ♣ ♠" }
      - label: "Entity / Topic Tags"
        name: "entity_tags"
        widget: "list"
        field: { label: "Entity", name: "entity", widget: "string" }

