          - { label: "SEO Section Title", name: "seo_section_title", widget: "string", default: "Full Review", required: false }
          - { label: "SEO Section Title Level", name: "seo_section_title_level", widget: "select", options: ["h2", "h3", "h1"], default: "h2", required: false, hint: "Heading size for the SEO section title" }
          - { label: "SEO Body", name: "seo_body", widget: "markdown", required: false }
          - { label: "Meta Title", name: "meta_title", widget: "string" }
          - { label: "Meta Description", name: "meta_description", widget: "text" }
          - { label: "OG Title", name: "og_title", widget: "string", required: false }
          - { label: "OG Description", name: "og_description", widget: "text", required: false }
          - { label: "OG Image", name: "og_image", widget: "image", required: false }
          - { label: "Canonical URL", name: "canonical", widget: "string", required: false }
          - label: "Entity Tags"
            name: "entity_tags"
            widget: "list"
            field: { label: "Entity", name: "entity", widget: "string" }
            required: false

      - label: "RealBridge"
        name: "realbridge"
