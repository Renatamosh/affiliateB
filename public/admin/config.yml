  - name: "settings"
    label: "⚙️ Settings"
    files:
      - label: "🧭 Navigation Menu"
        name: "navigation"
        file: "content/nav.json"
        format: json
        fields:
          - label: "Menu Items"
            name: "items"
            widget: "list"
            summary: "{{fields.label}}"
            hint: "Each row is one item in the top navigation bar. Drag to reorder."
            fields:
              - label: "Label"
                name: "label"
                widget: "string"
                hint: "The text shown in the nav bar, e.g. Platform Reviews"
              - label: "Link (URL)"
                name: "href"
                widget: "string"
                required: false
                hint: "Leave empty if this item has a dropdown. Use full path: /reviews/"
              - label: "Dropdown Links"
                name: "sub"
                widget: "list"
                required: false
                summary: "{{fields.label}} → {{fields.href}}"
                hint: "Add sub-links to create a dropdown. Leave empty for a direct link."
                fields:
                  - label: "Label"
                    name: "label"
                    widget: "string"
                  - label: "Link (URL)"
                    name: "href"
                    widget: "string"

