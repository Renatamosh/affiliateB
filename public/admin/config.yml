        format: json
        fields:
          - { label: "Platform Name", name: "name", widget: "string" }
          - { label: "Badge Text", name: "badge", widget: "string", hint: "e.g. Free for players · ACBL sanctioned" }
          - { label: "Featured Image", name: "featured_image", widget: "image", required: false }
          - { label: "Featured Image Alt Text", name: "featured_image_alt", widget: "string", required: false }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Overview Paragraph", name: "overview", widget: "text" }
          - label: "Content Sections"
