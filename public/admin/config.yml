          - label: "Pros"
            name: "pros"
            widget: "list"
            field: { label: "Pro", name: "pro", widget: "string" }
          - label: "Cons"
            name: "cons"
            widget: "list"
            field: { label: "Con", name: "con", widget: "string" }
          - { label: "Verdict", name: "verdict", widget: "text" }
          - label: "Star Ratings (Sidebar)"
            name: "scores"
            widget: "list"
            summary: "{{fields.label}}"
            fields:
              - { label: "Category Label", name: "label", widget: "string" }
              - { label: "Stars (1–5)", name: "n", widget: "number", value_type: "int", min: 1, max: 5 }
          - { label: "Overall Rating", name: "rating", widget: "number", value_type: "float", min: 1, max: 5, step: 0.1 }
          - { label: "Price (Quick Facts)", name: "price", widget: "string" }
          - { label: "Best For (Quick Facts)", name: "bestFor", widget: "string" }
          - { label: "Last Verified (Quick Facts)", name: "lastVerified", widget: "string" }
          - { label: "Visit Button URL", name: "visitUrl", widget: "string" }
          - label: "FAQ"
            name: "faq"
            widget: "list"
            summary: "{{fields.q}}"
            fields:
              - { label: "Question", name: "q", widget: "string" }
              - { label: "Answer", name: "a", widget: "text" }
          - { label: "SEO Section Title", name: "seo_section_title", widget: "string", default: "Full Review", required: false }
          - { label: "SEO Body", name: "seo_body", widget: "markdown", required: false }
          - { label: "Meta Title", name: "meta_title", widget: "string" }
          - { label: "Meta Description", name: "meta_description", widget: "text" }
          - { label: "OG Title", name: "og_title", widget: "string", required: false }
          - { label: "OG Description", name: "og_description", widget: "text", required: false }
