[build]
  command = "npm run build"
  publish = "out"

# === SECURITY & PERFORMANCE HEADERS ===
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache static assets aggressively
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Netlify Forms — form definitions are detected automatically from HTML
# No extra config needed; forms named "contact" and "newsletter" are handled.


# === URL RESTRUCTURE 301 REDIRECTS ===
# Permanent redirects from old paths to the new keyword-rich, cluster-based
# URLs. force = true ensures Netlify intercepts before serving any static
# file at the old path (so the old folders can stay until you delete them).
#
# Pricing/audience updates: May 2026.

[[redirects]]
  from = "/platforms"
  to = "/reviews/"
  status = 301
  force = true

