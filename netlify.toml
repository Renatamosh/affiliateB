# === 404 FALLBACK (must remain LAST) ===
# Netlify processes redirects top-to-bottom. The /* catch-all must stay last
# or it will swallow all the specific 301s above.
[[redirects]]
  from = "/*"
  to = "/404/index.html"
  status = 404
